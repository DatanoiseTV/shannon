name: release

# Triggered on a semver tag push (e.g. `v0.1.0`). Produces, per arch:
#   * shannon_<ver>-1_<deb-arch>.deb               — Debian package
#   * shannon-<ver>-<rust-triple>.tar.gz           — bare binary tarball
#
# Architectures: x86_64 (ubuntu-24.04) and aarch64 (ubuntu-24.04-arm,
# native runner). Both gated on Linux ≥ 5.8 with BTF.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-releases like v0.1.0-rc1
  workflow_dispatch:                # manual fire for dry-run / re-cut

permissions:
  contents: write                   # needed to create the GitHub release

jobs:
  build:
    name: build ${{ matrix.target.triple }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { runner: ubuntu-24.04,     triple: x86_64-unknown-linux-gnu,  deb_arch: amd64 }
          - { runner: ubuntu-24.04-arm, triple: aarch64-unknown-linux-gnu, deb_arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep -m1 '^version' shannon/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
            ver="${ver}-dev$(date -u +%Y%m%d%H%M)"
          fi
          echo "version=$ver" >>"$GITHUB_OUTPUT"
          echo "Building shannon $ver for ${{ matrix.target.triple }}"

      - name: Install toolchains (stable + nightly)
        run: |
          rustup toolchain install stable --component rustfmt,clippy
          rustup default stable
          rustup toolchain install nightly --component rust-src

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm llvm-dev libclang-dev libelf-dev pkg-config \
            dpkg-dev fakeroot

      - name: Install bpf-linker + cargo-deb
        run: |
          cargo install bpf-linker --locked
          cargo install cargo-deb --locked

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.triple }}

      - name: Build release
        run: cargo build --release --workspace -p shannon

      - name: Generate manpages
        run: cargo xtask manpages

      - name: Pack tarball
        id: pack
        run: |
          ver="${{ steps.meta.outputs.version }}"
          stage="shannon-${ver}-${{ matrix.target.triple }}"
          mkdir -p "dist/$stage"
          cp target/release/shannon "dist/$stage/"
          cp README.md DEMO.md SECURITY.md LICENSE-APACHE LICENSE-MIT "dist/$stage/" 2>/dev/null || true
          tar -C dist -czf "dist/${stage}.tar.gz" "$stage"
          (cd dist && sha256sum "${stage}.tar.gz" >"${stage}.tar.gz.sha256")
          ls -la dist/

      - name: Build .deb
        run: |
          # cargo-deb derives the deb arch from the host; on the native
          # arm64 runner it picks arm64, on x86_64 it picks amd64.
          cargo deb -p shannon --no-build
          cp target/debian/*.deb dist/
          (cd dist && for f in *.deb; do sha256sum "$f" >"${f}.sha256"; done)
          ls -la dist/

      - name: Smoke-check the binary
        run: |
          ./target/release/shannon --version
          ./target/release/shannon doctor || true   # exits non-zero without root, that's fine

      - uses: actions/upload-artifact@v4
        with:
          name: shannon-${{ matrix.target.triple }}
          path: dist/

  release:
    name: publish github release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          # Pull every per-arch artifact into dist/
          path: dist-by-arch
      - name: Flatten artefacts
        run: |
          mkdir -p dist
          find dist-by-arch -type f \( -name '*.deb' -o -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate release notes
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          prev=$(git tag --sort=-v:refname | grep -v "^${tag}$" | head -n1 || true)
          {
            echo "## shannon ${tag}"
            echo
            if [ -n "$prev" ]; then
              echo "### Changes since ${prev}"
              git log --pretty='- %s' "${prev}..${tag}"
            else
              echo "First tagged release."
            fi
            echo
            echo "### Install (Debian / Ubuntu)"
            echo
            echo '```bash'
            echo "# x86_64 (Intel / AMD)"
            echo "curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/shannon_${ver}-1_amd64.deb"
            echo "sudo dpkg -i shannon_${ver}-1_amd64.deb"
            echo
            echo "# aarch64 (Graviton / Ampere / RPi 4+)"
            echo "curl -LO https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/shannon_${ver}-1_arm64.deb"
            echo "sudo dpkg -i shannon_${ver}-1_arm64.deb"
            echo
            echo "sudo systemctl enable --now shannon   # optional: continuous recorder"
            echo '```'
            echo
            echo "### Verify"
            echo
            echo '```bash'
            echo "sha256sum -c shannon_${ver}-1_<arch>.deb.sha256"
            echo '```'
          } >notes.md
          cat notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            dist/*.deb
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
