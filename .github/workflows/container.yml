name: container

# Build + push a multi-arch container image to ghcr.io/datanoisetv/shannon.
# Tagged on every push to main (`main` + git short sha) and on every
# semver tag (`vX.Y.Z` + `latest` if it's the highest). Uses GHA's
# built-in registry credentials — no extra secrets needed for the
# default ghcr.io target.

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']
    paths:
      - 'Dockerfile'
      - 'shannon/**'
      - 'shannon-ebpf/**'
      - 'shannon-common/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/container.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # write to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # datanoisetv/shannon

jobs:
  build:
    name: build ${{ matrix.platform.tag }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-24.04,     tag: amd64, docker: linux/amd64 }
          - { runner: ubuntu-24.04-arm, tag: arm64, docker: linux/arm64 }
    outputs:
      digest-amd64: ${{ steps.export.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export.outputs.digest-arm64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (per-arch digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform.docker }}
          push: true
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.platform.tag }}
          # Cache scoped per-arch so the two parallel builds don't
          # stomp on each other's layer cache.
          cache-from: type=gha,scope=${{ matrix.platform.tag }}
          cache-to: type=gha,scope=${{ matrix.platform.tag }},mode=max

      - name: Export digest
        id: export
        run: |
          echo "digest-${{ matrix.platform.tag }}=${{ steps.build.outputs.digest }}" >>"$GITHUB_OUTPUT"

  manifest:
    name: assemble multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          base="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # Always tag with the commit sha for traceability.
          tags=("${base}:${{ github.sha }}")
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tags+=("${base}:${GITHUB_REF_NAME}")
            tags+=("${base}:${GITHUB_REF_NAME#v}")
            # Move `:latest` only on stable (no `-rc`/`-beta`) tags.
            case "${GITHUB_REF_NAME}" in
              v*-*) ;;  # pre-release, skip
              *)    tags+=("${base}:latest") ;;
            esac
          else
            tags+=("${base}:main")
          fi
          {
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo 'EOF'
          } >>"$GITHUB_OUTPUT"

      - name: Create manifest list
        env:
          BASE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          SHA: ${{ github.sha }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # The per-arch images already exist as ${BASE}:${SHA}-amd64 and
          # ${BASE}:${SHA}-arm64. `docker buildx imagetools create` glues
          # them into a manifest list under each requested tag.
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "tagging $tag"
            docker buildx imagetools create -t "$tag" \
              "${BASE}:${SHA}-amd64" \
              "${BASE}:${SHA}-arm64"
          done <<<"$TAGS"
